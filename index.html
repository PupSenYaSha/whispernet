<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>WhisperNet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="description" content="Secure minimalist messenger with E2EE" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WhisperNet" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  </head>
  <body class="bg-bg-primary text-fg-primary antialiased">
    <style>
      .screenshot-protect { -webkit-user-select: none; user-select: none; }
      .screenshot-protect img { -webkit-user-drag: none; pointer-events: none; }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
